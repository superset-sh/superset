name: ✨ Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe where Superset falls short. Knowing the problem helps us find the right fix, even if it's different from what you propose.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you imagine this working? Rough ideas are fine.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you've tried
      description: Anything you tried, even if it didn't fully work.
    validations:
      required: false
