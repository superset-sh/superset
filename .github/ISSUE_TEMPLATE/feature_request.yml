name: ✨ Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation where Superset falls short, not just the feature you want. This helps us find the best solution even if it differs from your proposal.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you imagine this working? Rough ideas are fine.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you've tried
    validations:
      required: false
