name: Merge macOS Auto-Update Manifests
description: >
  Downloads arm64 and x64 macOS update manifests from separate build artifacts
  and merges them into a single latest-mac.yml with entries for both architectures.
  arm64 is used as the canonical base (path/sha512).

inputs:
  artifact-prefix:
    description: "Artifact name prefix (e.g., 'desktop' or 'desktop-canary')"
    required: true
  artifacts-path:
    description: "Path to the release artifacts directory"
    required: false
    default: release-artifacts
  extra-manifest-names:
    description: "Comma-separated list of additional manifest filenames to write (e.g., 'canary-mac.yml')"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download arm64 macOS update manifest
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-mac-arm64-update-manifest
        path: manifests/arm64

    - name: Download x64 macOS update manifest
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-mac-x64-update-manifest
        path: manifests/x64

    - name: Merge macOS auto-update manifests
      shell: bash
      run: |
        ARM64=$(find manifests/arm64 -name '*-mac.yml' | head -1)
        X64=$(find manifests/x64 -name '*-mac.yml' | head -1)
        OUTPUT="${{ inputs.artifacts-path }}/latest-mac.yml"

        if [[ -n "$ARM64" && -n "$X64" ]]; then
          # Merge both arch manifests — arm64 is canonical (base path/sha512)
          yq eval-all '
            select(fileIndex == 0) *
            {"files": [select(fileIndex == 0).files[], select(fileIndex == 1).files[]]}
          ' "$ARM64" "$X64" > "$OUTPUT"
          echo "Merged arm64 + x64 manifests into latest-mac.yml"
        elif [[ -n "$ARM64" ]]; then
          cp "$ARM64" "$OUTPUT"
          echo "Using arm64-only manifest"
        elif [[ -n "$X64" ]]; then
          cp "$X64" "$OUTPUT"
          echo "Using x64-only manifest"
        fi

        # Write additional manifest copies (e.g., canary-mac.yml)
        IFS=',' read -ra EXTRA <<< "${{ inputs.extra-manifest-names }}"
        for name in "${EXTRA[@]}"; do
          name=$(echo "$name" | xargs)  # trim whitespace
          if [[ -n "$name" ]]; then
            cp "$OUTPUT" "${{ inputs.artifacts-path }}/$name"
            echo "Created copy: $name"
          fi
        done

        echo "Final latest-mac.yml:"
        cat "$OUTPUT"
