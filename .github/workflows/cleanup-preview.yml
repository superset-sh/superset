name: Cleanup Preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Cleanup Preview Resources
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Delete Neon branch
        id: neon-cleanup
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3.2.1
        continue-on-error: true
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ github.event.pull_request.head.ref }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Update comment
        if: always()
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: |
            ## 🧹 Preview Cleanup Complete

            The following preview resources have been cleaned up:
            - ${{ steps.neon-cleanup.outcome == 'success' && '✅' || '⚠️' }} Neon database branch

            Thank you for your contribution! 🎉
          comment-tag: "🚀-preview-deployment"
