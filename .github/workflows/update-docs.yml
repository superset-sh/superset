name: Update Docs

on:
  schedule:
    # Run every Wednesday at 9:00 AM UTC
    - cron: "0 9 * * 3"
  workflow_dispatch: # Allow manual triggering

jobs:
  update-docs:
    name: Update Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create branch
        run: |
          BRANCH_NAME="docs/update-$(date +%Y-%m-%d)-${GITHUB_RUN_ID}"
          git checkout -B "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Update docs with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "$(cat .github/prompts/update-docs.md)" \
            --model sonnet \
            --allowedTools "Bash(git*)" "Bash(gh*)" "Bash(date*)" "Bash(ls*)" "Read" "Write" "Edit" "Glob" "Grep"

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run lint fix
        if: steps.check-changes.outputs.has_changes == 'true'
        run: bun run lint:fix

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "docs: weekly docs update $(date +%Y-%m-%d)"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          gh pr create \
            --reviewer kitenite --reviewer saddlepaddle --reviewer AviPeltz \
            --title "docs: weekly docs update - $CURRENT_DATE" \
            --body "## Summary
          This PR was automatically generated by Claude Code to update documentation based on recent PRs.

          ## Details
          - **Prompt file**: \`.github/prompts/update-docs.md\`
          - **Generated on**: $CURRENT_DATE

          ## Review Checklist
          - [ ] Review all doc changes for accuracy
          - [ ] Verify new content matches actual product behavior
          - [ ] Check that no existing correct content was accidentally removed

          Please review the changes before merging." \
            --base main \
            --head "$BRANCH_NAME"
