name: Generate Changelog

on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.0.76)"
        required: true

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            # Extract version from tag ref: refs/tags/desktop-v0.0.76 -> 0.0.76
            VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Install Claude Code
        run: bun install -g @anthropic-ai/claude-code

      - name: Create branch
        run: |
          BRANCH_NAME="changelog/v${VERSION}-${GITHUB_RUN_ID}"
          git checkout -B "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Generate changelog with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "Version: $VERSION

          $(cat .github/prompts/generate-changelog.md)" --allowedTools "Bash(git*)" "Bash(gh*)" "Bash(date*)" "Bash(ls*)" "Read" "Write" "Edit" "Glob" "Grep"

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run lint fix
        if: steps.check-changes.outputs.has_changes == 'true'
        run: bun run lint:fix

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "docs: generate changelog for v${VERSION}"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --reviewer kitenite --reviewer saddlepaddle --reviewer AviPeltz \
            --title "docs: changelog for v${VERSION}" \
            --body "## Summary
          This PR was automatically generated by Claude Code to create the changelog for v${VERSION}.

          ## Details
          - **Prompt file**: \`.github/prompts/generate-changelog.md\`
          - **Version**: v${VERSION}
          - **Tag**: desktop-v${VERSION}

          ## Review Checklist
          - [ ] Replace \`IMAGE_PLACEHOLDER.png\` with actual screenshot
          - [ ] Review changelog content for accuracy
          - [ ] Add any missing screenshots where TODO comments indicate

          Please review the changes before merging." \
            --base main \
            --head "$BRANCH_NAME"
