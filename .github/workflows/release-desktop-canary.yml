name: Release Desktop Canary

on:
  schedule:
    # Every 12 hours at 12 AM and 12 PM UTC
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no changes detected"
        required: false
        type: boolean
        default: false
      build_scope:
        description: "Canary artifact scope"
        required: false
        type: choice
        default: quick
        options:
          - quick
          - full
      mac_signing:
        description: "macOS signing mode"
        required: false
        type: choice
        default: auto
        options:
          - auto
          - required
          - unsigned_internal

permissions:
  contents: write

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      build_time: ${{ steps.check.outputs.build_time }}
      version_timestamp: ${{ steps.check.outputs.version_timestamp }}
      build_scope: ${{ steps.check.outputs.build_scope }}
      macos_arches_json: ${{ steps.check.outputs.macos_arches_json }}
      build_linux: ${{ steps.check.outputs.build_linux }}
      mac_signing: ${{ steps.check.outputs.mac_signing }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check for changes since last canary
        id: check
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          # Capture build timestamp (works for both scheduled and manual runs)
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

          # Version timestamp for unique canary versions (YYYYMMDDHHMMSS format)
          # This ensures each canary build has a unique, incrementing version
          VERSION_TIMESTAMP=$(date -u +'%Y%m%d%H%M%S')
          echo "version_timestamp=$VERSION_TIMESTAMP" >> $GITHUB_OUTPUT

          FORCE_BUILD="${{ github.event.inputs.force_build }}"
          BUILD_SCOPE="${{ github.event.inputs.build_scope }}"
          MAC_SIGNING="${{ github.event.inputs.mac_signing }}"

          if [ -z "$BUILD_SCOPE" ]; then
            BUILD_SCOPE="quick"
          fi

          if [ -z "$MAC_SIGNING" ]; then
            MAC_SIGNING="auto"
          fi

          case "$BUILD_SCOPE" in
            quick)
              echo "Quick canary requested: macOS arm64 only."
              echo 'macos_arches_json=["arm64"]' >> $GITHUB_OUTPUT
              echo "build_linux=false" >> $GITHUB_OUTPUT
              ;;
            full)
              echo "Full canary requested: macOS arm64/x64 + Linux x64."
              echo 'macos_arches_json=["arm64","x64"]' >> $GITHUB_OUTPUT
              echo "build_linux=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unsupported build_scope: $BUILD_SCOPE"
              exit 1
              ;;
          esac

          case "$MAC_SIGNING" in
            auto|required|unsigned_internal)
              ;;
            *)
              echo "::error::Unsupported mac_signing mode: $MAC_SIGNING"
              exit 1
              ;;
          esac

          echo "build_scope=$BUILD_SCOPE" >> $GITHUB_OUTPUT
          echo "mac_signing=$MAC_SIGNING" >> $GITHUB_OUTPUT

          if [ "$FORCE_BUILD" = "true" ]; then
            echo "Force build requested, skipping change detection..."
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            # Get the commit SHA of the last canary release
            LAST_CANARY_SHA=$(git rev-parse desktop-canary 2>/dev/null || echo "")

            if [ -z "$LAST_CANARY_SHA" ]; then
              echo "No previous canary release found, building..."
              echo "should_build=true" >> $GITHUB_OUTPUT
            elif [ "$LAST_CANARY_SHA" = "$(git rev-parse HEAD)" ]; then
              echo "No changes since last canary release, skipping..."
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "Changes detected since last canary, building..."
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    uses: ./.github/workflows/build-desktop.yml
    with:
      channel: canary
      version_suffix: "-canary.${{ needs.check-changes.outputs.version_timestamp }}"
      electron_builder_config: electron-builder.canary.ts
      artifact_prefix: desktop-canary
      artifact_retention_days: 7
      build_macos: true
      macos_arches_json: ${{ needs.check-changes.outputs.macos_arches_json }}
      build_linux: ${{ needs.check-changes.outputs.build_linux == 'true' }}
      mac_signing: ${{ needs.check-changes.outputs.mac_signing }}
    secrets: inherit

  release:
    name: Update Canary Release
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create release body
        env:
          BUILD_SCOPE: ${{ needs.check-changes.outputs.build_scope }}
          BUILD_TIME: ${{ needs.check-changes.outputs.build_time }}
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_APPLE_ID: ${{ secrets.APPLE_ID }}
          MAC_APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          MAC_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_SIGNING: ${{ needs.check-changes.outputs.mac_signing }}
          SHORT_SHA: ${{ needs.check-changes.outputs.short_sha }}
        run: |
          if [[ "$MAC_SIGNING" == "unsigned_internal" ]]; then
            MAC_SIGNING_STATUS="Ad-hoc signed internal build"
            MAC_SIGNING_NOTES="This build is ad-hoc signed but not Developer ID notarized. For internal testing only, install the app and run: \`xattr -dr com.apple.quarantine /Applications/Superset\\ Canary.app\`"
          elif [[ -n "${MAC_CERTIFICATE:-}" && -n "${MAC_CERTIFICATE_PASSWORD:-}" && -n "${MAC_APPLE_ID:-}" && -n "${MAC_APPLE_ID_PASSWORD:-}" && -n "${MAC_APPLE_TEAM_ID:-}" ]]; then
            MAC_SIGNING_STATUS="Developer ID signed and notarized"
            MAC_SIGNING_NOTES="macOS artifacts are expected to open normally after download."
          else
            MAC_SIGNING_STATUS="Ad-hoc signed internal build"
            MAC_SIGNING_NOTES="This build is ad-hoc signed because Developer ID signing/notarization secrets are incomplete. For internal testing only, install the app and run: \`xattr -dr com.apple.quarantine /Applications/Superset\\ Canary.app\`"
          fi

          cat > release-body.md <<EOF
          **Internal Testing Build**

          This is an automated canary build from \`main\` branch.

          - Commit: ${{ github.sha }}
          - Short SHA: ${SHORT_SHA}
          - Built: ${BUILD_TIME}
          - Build scope: ${BUILD_SCOPE}
          - macOS signing mode: ${MAC_SIGNING}
          - macOS signing status: ${MAC_SIGNING_STATUS}

          ${MAC_SIGNING_NOTES}

          This build is for internal testing only and may be unstable.
          EOF

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-artifacts
          pattern: desktop-canary-*
          merge-multiple: true

      - name: Merge macOS auto-update manifests
        uses: ./.github/actions/merge-mac-manifests
        with:
          artifact-prefix: desktop-canary
          extra-manifest-names: canary-mac.yml

      - name: Create canary-named copies for updater URLs
        run: |
          cd release-artifacts
          for file in *.AppImage; do
            if [[ -f "$file" ]]; then
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.AppImage$/\1/')
              cp "$file" "Superset-Canary-${arch}.AppImage"
              echo "Created canary copy: Superset-Canary-${arch}.AppImage"
            fi
          done
          # Prerelease builds may request canary-linux.yml; keep latest-linux.yml as fallback.
          for file in *-linux.yml; do
            if [[ -f "$file" && "$file" != "canary-linux.yml" && "$file" != "latest-linux.yml" ]]; then
              cp "$file" "canary-linux.yml"
              cp "$file" "latest-linux.yml"
              echo "Created canary manifests: canary-linux.yml, latest-linux.yml from $file"
              break
            fi
          done

      - name: List artifacts
        run: |
          echo "Release artifacts:"
          ls -la release-artifacts/

      - name: Delete existing canary release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if it exists
          gh release delete desktop-canary --yes || true
          # Delete the tag
          git push origin :refs/tags/desktop-canary || true

      - name: Create Canary Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: desktop-canary
          name: "Superset Desktop Canary"
          body_path: release-body.md
          prerelease: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
