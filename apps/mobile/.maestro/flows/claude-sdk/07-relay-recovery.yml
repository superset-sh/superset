appId: sh.superset.mobile
---
# Run after restarting this worktree's relay. The same host-local runtime and
# phone route must reconnect without a session retry or app restart.
- launchApp:
    stopApp: false
- extendedWaitUntil:
    notVisible: "Host offline — open Superset on your Mac to reconnect."
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: "claude-session-composer-input"
      enabled: true
    timeout: 60000
- tapOn:
    id: "claude-session-composer-input"
- inputText: "Do not use tools. Reply exactly MOBILE RELAY RECOVERY OK and nothing else."
- tapOn:
    id: "claude-session-composer-submit"
    enabled: true
- extendedWaitUntil:
    visible: "MOBILE RELAY RECOVERY OK"
    timeout: 180000
