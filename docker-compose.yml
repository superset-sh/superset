services:
  postgres:
    image: postgres:17
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: main
    ports:
      - "${LOCAL_PG_PORT:-5432}:5432"
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/main
    ports:
      - "${LOCAL_NEON_PROXY_PORT:-4444}:4444"
    depends_on:
      postgres:
        condition: service_healthy

  electric:
    image: electricsql/electric:1.4.13
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/main?sslmode=disable
      ELECTRIC_SECRET: local_electric_dev_secret
    ports:
      - "${LOCAL_ELECTRIC_PORT:-3100}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${LOCAL_REDIS_PORT:-6379}:6379"
    volumes:
      - superset_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kv-rest:
    build:
      context: ./packages/local-kv-rest
    image: superset-local-kv-rest:latest
    environment:
      KV_REST_API_TOKEN: ${KV_REST_API_TOKEN:-local-kv-token}
      REDIS_ADDR: redis:6379
      PORT: 80
    ports:
      - "${LOCAL_KV_REST_PORT:-8079}:80"
    depends_on:
      redis:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-superset}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-superset-local-artifacts}
    ports:
      - "127.0.0.1:${LOCAL_S3_PORT:-9000}:9000"
      - "127.0.0.1:${LOCAL_S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - superset_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-superset}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-superset-local-artifacts}
      SUPERSET_OBJECT_STORAGE_BUCKET: ${SUPERSET_OBJECT_STORAGE_BUCKET:-superset-artifacts}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set superset http://minio:9000 "${MINIO_ROOT_USER:-superset}" "${MINIO_ROOT_PASSWORD:-superset-local-artifacts}"; do
          sleep 1
        done
        mc mb --ignore-existing "superset/${SUPERSET_OBJECT_STORAGE_BUCKET:-superset-artifacts}"
        mc anonymous set none "superset/${SUPERSET_OBJECT_STORAGE_BUCKET:-superset-artifacts}"

volumes:
  superset_db_data:
  superset_redis_data:
  superset_minio_data:
